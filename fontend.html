<!DOCTYPE html>
<html>
<head>
    <title>Work Mode Analyzer</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            padding: 8px;
            width: 250px;
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #resultBox {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            display: none;
        }
    </style>
</head>

<body>

<h1>Work Mode Analyzer</h1>

<label>Work Location:</label>
<select id="work_location">
    <option value="remote">Remote</option>
    <option value="hybrid">Hybrid</option>
    <option value="onsite">Onsite</option>
</select>

<label>Hours Worked:</label>
<input type="number" id="hours" placeholder="e.g. 40">

<label>Meetings:</label>
<input type="number" id="meetings" placeholder="e.g. 5">

<label>Work-Life Balance (1-10):</label>
<input type="number" id="balance">

<label>Isolation (1-10):</label>
<input type="number" id="isolation">

<label>Sleep Quality:</label>
<select id="sleep">
    <option value="poor">Poor</option>
    <option value="average">Average</option>
    <option value="good">Good</option>
</select>

<button onclick="predict()">Predict</button>

<div id="resultBox">
    <h3>Prediction Result</h3>
    <p id="stress"></p>
    <p id="productivity"></p>
</div>

<script>
function predict() {

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            work_location: document.getElementById("work_location").value,
            hours: document.getElementById("hours").value,
            meetings: document.getElementById("meetings").value,
            work_life_balance: document.getElementById("balance").value,
            isolation: document.getElementById("isolation").value,
            sleep_quality: document.getElementById("sleep").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("stress").innerText =
            "Stress Level: " + data.stress;
        document.getElementById("productivity").innerText =
            "Productivity: " + data.productivity;
    })
    .catch(error => {
        alert("Error connecting to server");
        console.log(error);
    });
}
</script>

</body>
</html>
